version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: propadmin_db
    environment:
      POSTGRES_USER: ${DB_USER:-propadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-propadmin123}
      POSTGRES_DB: ${DB_NAME:-propadmin_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-propadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: propadmin_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-propadmin}:${DB_PASSWORD:-propadmin123}@db:5432/${DB_NAME:-propadmin_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: propadmin_web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000/api}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
